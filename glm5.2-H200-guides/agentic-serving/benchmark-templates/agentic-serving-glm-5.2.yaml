# ---------------------------------------------------------------------------
# inference-perf workload template for the agentic-serving guide
# (GLM-5.2-FP8 on H200, P/D-disaggregated 1p1d-dep8).
#
# Adapted from the Nemotron agentic-serving benchmark template.
# Shared-prefix workload with large, cacheable system prompts and a ramped
# request rate exercising cross-request prefix reuse under sustained load.
#
# Render with `envsubst < agentic-serving-glm-5.2.yaml > config.yaml`
# AFTER exporting:
#   NAMESPACE  namespace where the stack is deployed
#   IP         EPP service ClusterIP (base_url = http://${IP})
# ---------------------------------------------------------------------------
endpoint:
  stack_name: &stack_name agentic-serving-GLM-5.2-FP8
  model: &model zai-org/GLM-5.2-FP8
  namespace: &namespace ${NAMESPACE}
  base_url: &url http://${IP}
  hf_token_secret: llm-d-hf-token

control:
  work_dir: $HOME/llm-d-bench-work
  kubectl: kubectl

harness:
  name: &harness_name inference-perf
  results_pvc: benchmark-results
  namespace: *namespace
  parallelism: 1
  wait_timeout: 6000
  image: ghcr.io/llm-d/llm-d-benchmark:v0.6.0

env:
  - name: RAYON_NUM_THREADS
    value: "4"

workload:
  agentic_shared_prefix:
    load:
      type: constant
      stages:
      - rate: 2
        duration: 120
      - rate: 4
        duration: 120
      - rate: 6
        duration: 120
      - rate: 8
        duration: 120
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
    tokenizer:
      pretrained_model_name_or_path: zai-org/GLM-5.2-FP8
    data:
      type: shared_prefix
      shared_prefix:
        num_groups: 10
        num_prompts_per_group: 50
        system_prompt_len: 3000
        question_len: 4000
        output_len: 1024
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
